    <script>
      (function() {
        var isClient = ["/cliente", "/area-cliente", "/checkout"].some(function(route) {
          return window.location.pathname.startsWith(route);
        });
        if (isClient) {
          var manifestLink = document.getElementById('pwa-manifest') || document.querySelector('link[rel="manifest"]');
          if (manifestLink) {
            manifestLink.href = '/client-manifest.webmanifest';
          }
        }
      })();
    </script>
